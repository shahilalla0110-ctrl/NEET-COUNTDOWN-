<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET Ultimate Study Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
background: radial-gradient(circle at top,#0f172a,#020617);
color:#e5e7eb;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
opacity:.7;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.card h2{
margin-bottom:12px;
font-size:18px;
}

/* Countdown */
.countdown{display:flex;gap:10px;justify-content:space-between}
.box{text-align:center;background:rgba(255,255,255,0.08);padding:10px;border-radius:10px;flex:1}
.number{font-size:22px;font-weight:600}
.label{font-size:11px;opacity:.7}

/* Progress */
.progress{background:rgba(255,255,255,.1);height:18px;border-radius:10px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#4ade80)}

button{
margin-top:10px;
padding:7px 12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer
}

button:hover{opacity:.85}

/* Timer */
.timer{font-size:30px;margin:10px 0}

/* Checklist */
.checklist label{display:block;margin:6px 0;font-size:14px}

/* Score input */
input{
width:100%;
padding:8px;
border-radius:8px;
border:none;
margin-top:8px;
}

.quote{font-style:italic;opacity:.85}

.footer{text-align:center;margin-top:30px;font-size:12px;opacity:.5}
</style>
</head>
<body>

<div class="container">
<h1>NEET Ultimate Study Dashboard</h1>
<p class="subtitle">Future Doctor Mode Activated</p>

<div class="grid">

<!-- Countdown -->
<div class="card">
<h2>NEET Countdown</h2>
<div class="countdown">
<div class="box"><div id="days" class="number">0</div><div class="label">Days</div></div>
<div class="box"><div id="hours" class="number">0</div><div class="label">Hours</div></div>
<div class="box"><div id="minutes" class="number">0</div><div class="label">Min</div></div>
<div class="box"><div id="seconds" class="number">0</div><div class="label">Sec</div></div>
</div>
</div>

<!-- Progress Tracker -->
<div class="card">
<h2>Study Progress</h2>
<div class="progress"><div id="progressBar" class="bar"></div></div>
<button onclick="addProgress()">+ Study Done</button>
<button onclick="resetProgress()">Reset</button>
</div>

<!-- Pomodoro -->
<div class="card">
<h2>Pomodoro Timer</h2>
<div id="timer" class="timer">25:00</div>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>
</div>

<!-- Motivation -->
<div class="card">
<h2>Daily Motivation</h2>
<div id="quote" class="quote"></div>
</div>

<!-- Syllabus Tracker -->
<div class="card">
<h2>Syllabus Tracker</h2>
<div class="checklist">
<label><input type="checkbox"> Physics Completed</label>
<label><input type="checkbox"> Chemistry Completed</label>
<label><input type="checkbox"> Biology Completed</label>
</div>
</div>

<!-- Mock Score -->
<div class="card">
<h2>Mock Test Score</h2>
<input id="scoreInput" placeholder="Enter mock test score">
<button onclick="saveScore()">Save Score</button>
<div id="scoreDisplay"></div>
</div>

<!-- Lofi music -->
<div class="card">
<h2>Study Music</h2>
<iframe width="100%" height="120" src="https://www.youtube.com/embed/jfKfPfyJRdk" title="lofi" frameborder="0" allowfullscreen></iframe>
</div>

</div>

<div class="footer">Built for NEET Aspirants</div>

</div>

<script>

/* Countdown */
const examDate = new Date("May 3, 2026 14:00:00").getTime();
function updateCountdown(){
const now=new Date().getTime();
const d=examDate-now;
if(d>0){
document.getElementById('days').innerText=Math.floor(d/(1000*60*60*24));
document.getElementById('hours').innerText=Math.floor((d%(1000*60*60*24))/(1000*60*60));
document.getElementById('minutes').innerText=Math.floor((d%(1000*60*60))/(1000*60));
document.getElementById('seconds').innerText=Math.floor((d%(1000*60))/1000);
}}
setInterval(updateCountdown,1000);
updateCountdown();

/* Progress */
let progress=0;
function addProgress(){if(progress<100){progress+=5;document.getElementById('progressBar').style.width=progress+'%';}}
function resetProgress(){progress=0;document.getElementById('progressBar').style.width='0%';}

/* Pomodoro */
let time=1500;let interval;
function startTimer(){clearInterval(interval);interval=setInterval(()=>{let m=Math.floor(time/60);let s=time%60;if(s<10)s='0'+s;document.getElementById('timer').innerText=m+':'+s;time--;if(time<0){clearInterval(interval);alert('Break time!');}},1000)}
function resetTimer(){clearInterval(interval);time=1500;document.getElementById('timer').innerText='25:00'}

/* Quotes */
const quotes=[
"Study now so you can save lives later.",
"Every chapter you finish increases your rank.",
"Future doctors don’t quit.",
"Your white coat is waiting.",
"Pain of discipline > pain of regret"
];
document.getElementById('quote').innerText=quotes[Math.floor(Math.random()*quotes.length)];

/* Score tracker */
function saveScore(){
let score=document.getElementById('scoreInput').value;
localStorage.setItem('neetScore',score);
document.getElementById('scoreDisplay').innerText="Last Score: "+score;
}

if(localStorage.getItem('neetScore')){
document.getElementById('scoreDisplay').innerText="Last Score: "+localStorage.getItem('neetScore');
}

</script>

</body>
</html>
